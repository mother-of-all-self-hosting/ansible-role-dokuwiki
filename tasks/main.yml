---
- name: Perform Actual installation tasks
  when: actual_enabled | bool
  tags:
    - setup-all
    - setup-actual
    - install-all
    - install-actual
  block:
    - name: Validate Actual configuration
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate_config.yml"
    - name: Install Actual
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/install.yml"

- name: Perform Actual uninstallation tasks
  when: not actual_enabled | bool
  tags:
    - setup-all
    - setup-actual
  block:
    - name: Uninstall Actual
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uninstall.yml"
