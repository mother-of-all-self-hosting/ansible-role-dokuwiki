---
- name: Fail if required Actual settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - actual_uid
    - actual_gid
    - actual_hostname
    - actual_path_prefix
    - actual_container_network

- name: Run if Traefik is enabled
  when: actual_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Actual are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - actual_container_labels_traefik_hostname
        - actual_container_labels_traefik_path_prefix

    - name: Fail if actual_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          actual_container_labels_traefik_path_prefix (`{{ actual_container_labels_traefik_path_prefix }}`) must be `/`.
          Actual does not support hosting under a subpath yet.
      when: "actual_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `actual_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if actual_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          actual_container_labels_traefik_path_prefix (`{{ actual_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/actual`).
      when: "actual_container_labels_traefik_path_prefix != '/' and actual_container_labels_traefik_path_prefix[-1] == '/'"
