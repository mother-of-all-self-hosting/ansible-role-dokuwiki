---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "dokuwiki_php_uploadlimit", "new": "dokuwiki_environment_variables_php_uploadlimit" }
    - { "old": "dokuwiki_php_memorylimit", "new": "dokuwiki_environment_variables_php_memorylimit" }
    - { "old": "dokuwiki_php_timezone", "new": "dokuwiki_environment_variables_tz" }

- name: Fail if required DokuWiki settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - dokuwiki_uid
    - dokuwiki_gid
    - dokuwiki_hostname
    - dokuwiki_path_prefix
    - dokuwiki_container_network

- name: Run if Traefik is enabled
  when: dokuwiki_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for DokuWiki are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - dokuwiki_container_labels_traefik_hostname
        - dokuwiki_container_labels_traefik_path_prefix

    - name: Fail if dokuwiki_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          dokuwiki_container_labels_traefik_path_prefix (`{{ dokuwiki_container_labels_traefik_path_prefix }}`) must be `/`.
          DokuWiki does not support hosting under a subpath yet.
      when: "dokuwiki_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `dokuwiki_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if dokuwiki_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          dokuwiki_container_labels_traefik_path_prefix (`{{ dokuwiki_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/dokuwiki`).
      when: "dokuwiki_container_labels_traefik_path_prefix != '/' and dokuwiki_container_labels_traefik_path_prefix[-1] == '/'"
