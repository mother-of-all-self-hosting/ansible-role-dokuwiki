---
- name: Ensure DokuWiki paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ dokuwiki_uid }}"
    group: "{{ dokuwiki_gid }}"
  with_items:
    - "{{ dokuwiki_base_path }}"
    - "{{ dokuwiki_data_path }}"

- name: Ensure DokuWiki support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ dokuwiki_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ dokuwiki_uid }}"
    group: "{{ dokuwiki_gid }}"
  with_items:
    - env
    - labels
  register: dokuwiki_support_files_result

- name: Run if self-building of DokuWiki container image is not enabled
  when: "not dokuwiki_container_image_self_build | bool"
  block:
    - name: Ensure DokuWiki container image is pulled via community.docker.docker_image
      when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
      community.docker.docker_image:
        name: "{{ dokuwiki_container_image }}"
        source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
        force_source: "{{ dokuwiki_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
        force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else dokuwiki_container_image_force_pull }}"
      register: dokuwiki_container_image_pull_result_ansible_module
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: dokuwiki_container_image_pull_result_ansible_module is not failed

    - name: Ensure DokuWiki container image is pulled via ansible.builtin.command
      when: devture_systemd_docker_base_container_image_pull_method == 'command'
      ansible.builtin.command:
        cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ dokuwiki_container_image }}"
      register: dokuwiki_container_image_pull_result_command
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: dokuwiki_container_image_pull_result_command is not failed
      changed_when: "'Downloaded newer image' in dokuwiki_container_image_pull_result_command.stdout"

- name: Run if self-building of DokuWiki container image is enabled
  when: "dokuwiki_container_image_self_build | bool"
  block:
    - name: Ensure DokuWiki repository is present on self-build
      ansible.builtin.git:
        repo: "{{ dokuwiki_container_image_self_build_repo }}"
        version: "{{ dokuwiki_container_image_self_build_repo_version }}"
        dest: "{{ dokuwiki_container_image_self_build_src_files_path }}"
        force: "yes"
      register: dokuwiki_git_pull_results

    - name: Ensure DokuWiki container image is built
      community.docker.docker_image:
        name: "{{ dokuwiki_container_image_self_build_name }}"
        source: build
        force_source: "{{ dokuwiki_git_pull_results.changed if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
        force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else dokuwiki_git_pull_results.changed }}"
        build:
          dockerfile: Dockerfile
          path: "{{ dokuwiki_container_image_self_build_repo_dockerfile_dir }}"
          pull: true
          args:
      register: dokuwiki_container_image_build_result

- name: Ensure DokuWiki container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ dokuwiki_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: dokuwiki_network_creation_result

- name: Ensure DokuWiki container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ dokuwiki_container_network }}
  register: dokuwiki_network_creation_result
  changed_when: dokuwiki_network_creation_result.rc == 0
  failed_when: dokuwiki_network_creation_result.rc != 0 and 'already exists' not in dokuwiki_network_creation_result.stderr

- name: Ensure DokuWiki systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/dokuwiki.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ dokuwiki_identifier }}.service"
    mode: "0644"
  register: dokuwiki_systemd_service_result

- name: Determine whether DokuWiki needs a restart
  ansible.builtin.set_fact:
    dokuwiki_restart_necessary: >-
      {{
        dokuwiki_support_files_result.changed | default(false)
        or dokuwiki_systemd_service_result.changed | default(false)
        or dokuwiki_container_image_pull_result_ansible_module.changed | default(false)
        or dokuwiki_container_image_pull_result_command.changed | default(false)
        or dokuwiki_container_image_build_result.changed | default(false)
      }}
